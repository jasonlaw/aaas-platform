eval_profile: meta-eval-generation-v1
version: 1
purpose: "Static, synthetic test of the Admin Agent's onboarding generation step (onboard-tenant.md step 1.1). Does not test any real tenant. Run manually whenever platform/AGENTS.md changes or the Admin Agent's underlying model changes - there is no CI/CD system in this repo, so this is not automated on every commit."
synthetic_profiles:
  - profile_id: vegan-bakery
    business_type: "vegan bakery"
    business_name: "Sunrise Vegan Bakery"
    location: "Seattle, WA"
    given_facts:
      - "Sells sourdough bread and cinnamon rolls"
      - "Open Tuesday through Sunday, 7am to 3pm"
      - "All items are dairy-free and egg-free"
  - profile_id: laundromat
    business_type: "24/7 laundromat"
    business_name: "QuickWash Laundromat"
    location: "Austin, TX"
    given_facts:
      - "Open 24 hours, no staff overnight"
      - "Coin and card payment accepted"
      - "Large-capacity machines available for comforters and rugs"
  - profile_id: hair-salon
    business_type: "hair salon"
    business_name: "Modern Cuts Studio"
    location: "Denver, CO"
    given_facts:
      - "Services: haircuts, color, blowouts"
      - "Appointment-only, no walk-ins"
      - "Closed Mondays"
checks:
  - name: no_hallucinated_facts
    match_type: semantic
    judge_for: "For each synthetic profile, the generated INDUSTRY_BRAND_FACTS_BLOCK must contain only facts present in that profile's given_facts list (or directly, conservatively inferable from business_type/business_name/location - e.g. 'bakery' implying baked goods in general terms). It must not invent specific facts not given, such as a specific menu item, price, or service not listed in given_facts. This requires reading the actual generated output, not a literal string match."
  - name: generated_eval_checks_reference_given_facts
    match_type: semantic
    judge_for: "For each synthetic profile, the generated per-tenant eval checks must reference only the given_facts for that profile (e.g. a literal check's must_include term should be a fact or close paraphrase from given_facts, not an invented detail). A generated check that tests for a fact not in given_facts is a failure of this check."
  - name: industry_capabilities_relevant
    match_type: semantic
    judge_for: "For each synthetic profile, INDUSTRY_CAPABILITIES_BLOCK's 3-6 bullets must be plausible, concrete capabilities for that specific business_type (e.g. 'social media captions' fits a bakery; 'inventory restock notes' does not fit a laundromat with no inventory). Generic copy-pasted-sounding bullets that could apply to any business equally are a failure of this check."