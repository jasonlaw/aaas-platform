profile: skill-verification-primitives-v1
version: 1
purpose: >
  Fixed, vertical-agnostic library of verification primitive types. When the
  tenant agent codifies a solved task into a new skill, it must attach a
  verification spec chosen from this list (with concrete parameters it
  supplies), not invent a new kind of check. This file is never generated or
  edited per tenant.
primitives:
  - type: file_exists_at
    description: "A file matching a path/glob exists after the skill runs."
    params: [path_pattern]
  - type: file_does_not_exist_at
    description: "A file that should have been removed/avoided is absent."
    params: [path_pattern]
  - type: content_includes
    description: "The skill's text output or saved file contains a required string."
    params: [target, must_include]
  - type: no_error_thrown
    description: "The tool call(s) the skill makes complete without raising an exception."
    params: []
  - type: confirmation_sent_before
    description: >
      For any skill step that posts, sends, or deletes, a confirmation message
      was sent to the owner and a positive reply received before that step ran.
    params: [action_description]
  - type: credential_scan
    description: >
      Scans the skill file for patterns that suggest embedded credentials,
      API keys, passwords, or connection strings. Fails if any match is found.
      Pattern list is sourced from platform-policy.yaml's no_credential_persistence
      rule, which requires that the only persistent home for credential data
      is /opt/data/.env. This check runs automatically
      on every self-written skill — the tenant agent does not need to specify
      it; skill-verify.sh applies it unconditionally before evaluating the
      agent-supplied spec.
    params: []
    patterns:
      # Common API key prefixes
      - "sk-[A-Za-z0-9_-]{10,}"        # OpenAI / OpenRouter style
      - "sk-ant-[A-Za-z0-9_-]{10,}"    # Anthropic style
      - "av_agt_[A-Za-z0-9_-]{10,}"    # Agent Vault proxy token
      # Generic credential patterns in skill file text
      - "password[[:space:]]*=[[:space:]]*[^{]"
      - "passwd[[:space:]]*=[[:space:]]*[^{]"
      - "secret[[:space:]]*=[[:space:]]*[^{]"
      - "token[[:space:]]*=[[:space:]]*[^{]"
      # Connection strings
      - "://[^[:space:]]*:[^[:space:]]*@"   # user:pass@host pattern
      - "mongodb\\+srv://"
      - "postgresql://"
      - "mysql://"
fallback:
  type: judge
  description: >
    Use only when no primitive above can express the success condition (e.g.
    subjective output quality). This type cannot be auto-verified inside the
    tenant container - skill-verify.sh will always record WARN and set
    status=provisional. Operator review against the judge_for field is required
    before treating a judge-verified skill as trusted.